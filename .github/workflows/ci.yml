name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      NODE_ENV: test
      # Keep CI isolated from real provider credentials.
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      OPENROUTER_API_KEY: ""
      KIMI_API_KEY: ""
      DEEPSEEK_API_KEY: ""
      GOOGLE_API_KEY: ""
      BYTEPLUS_ARK_API_KEY: ""
      FAL_API_KEY: ""
      ESTACODA_TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_BOT_TOKEN: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Enable Corepack
        run: corepack enable

      - name: Show tool versions
        run: |
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check whitespace and patch hygiene
        run: git diff --check

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run unit tests
        run: pnpm run test

      - name: Run smoke tests
        run: pnpm run smoke

      - name: Build dist output
        run: pnpm run build

      - name: Audit runtime imports
        run: pnpm run audit:runtime-imports

      - name: Audit emitted ESM
        run: pnpm run audit:esm

      - name: Smoke built dist
        run: pnpm run smoke:dist
