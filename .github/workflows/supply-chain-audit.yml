name: Supply Chain Audit

# High-signal PR diff audit for supply-chain risks in a Node/pnpm agent runtime.
# Keep this narrow. Secret scanning and OSV vulnerability scanning live in
# separate workflows; this job focuses on risky code/config patterns introduced
# by a PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit PR diff for critical supply-chain risks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Scan changed files and added lines
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            git fetch --no-tags origin main
            BASE="origin/main"
            HEAD="HEAD"
          fi

          CHANGED=$(git diff --name-only "$BASE"..."$HEAD" || true)
          ADDED=$(git diff --unified=0 "$BASE"..."$HEAD" -- \
            ':!pnpm-lock.yaml' \
            ':!website/pnpm-lock.yaml' \
            ':!scripts/whatsapp-bridge/package-lock.json' \
            | grep '^+' | grep -v '^+++' || true)

          mkdir -p .supply-chain-audit
          FINDINGS=.supply-chain-audit/findings.md
          ADVISORY=.supply-chain-audit/advisory.md
          : > "$FINDINGS"
          : > "$ADVISORY"

          add_finding() {
            {
              echo "### 🚨 $1"
              echo
              echo "$2"
              echo
            } >> "$FINDINGS"
          }

          add_advisory() {
            {
              echo "### ⚠️ $1"
              echo
              echo "$2"
              echo
            } >> "$ADVISORY"
          }

          # 1. GitHub Actions footguns.
          WORKFLOW_CHANGES=$(echo "$CHANGED" | grep -E '^\.github/workflows/.*\.ya?ml$' || true)
          if [ -n "$WORKFLOW_CHANGES" ]; then
            add_advisory "Workflow files changed" "Review workflow permission changes, third-party actions, release steps, and secret access.\n\n\`\`\`text\n$WORKFLOW_CHANGES\n\`\`\`"
          fi

          if echo "$ADDED" | grep -nE '^\+\s*pull_request_target\s*:' >/tmp/sca_hits.txt; then
            add_finding "pull_request_target introduced" "\`pull_request_target\` runs with base-repo privileges and can expose secrets to unsafe PR code if misused.\n\n\`\`\`text\n$(cat /tmp/sca_hits.txt)\n\`\`\`"
          fi

          if echo "$ADDED" | grep -nE '^\+\s*(permissions:\s*write-all|contents:\s*write|packages:\s*write|id-token:\s*write)' >/tmp/sca_hits.txt; then
            add_advisory "Workflow write permissions changed" "Confirm the permission is necessary and scoped to the smallest job possible.\n\n\`\`\`text\n$(cat /tmp/sca_hits.txt)\n\`\`\`"
          fi

          # 2. npm lifecycle scripts. These run implicitly during install/publish.
          if git diff --unified=0 "$BASE"..."$HEAD" -- \
            'package.json' 'website/package.json' 'scripts/whatsapp-bridge/package.json' \
            | grep '^+' | grep -v '^+++' \
            | grep -nE '"(preinstall|install|postinstall|prepare|prepublish|prepublishOnly)"\s*:' >/tmp/sca_hits.txt; then
            add_finding "npm lifecycle script introduced or modified" "Lifecycle scripts execute during install or publish and are a common supply-chain attack surface.\n\n\`\`\`text\n$(cat /tmp/sca_hits.txt)\n\`\`\`"
          fi

          # 3. Obfuscated dynamic execution in JS/TS.
          JS_ADDED=$(git diff --unified=0 "$BASE"..."$HEAD" -- '*.js' '*.jsx' '*.ts' '*.tsx' '*.mjs' '*.cjs' \
            | grep '^+' | grep -v '^+++' || true)

          if echo "$JS_ADDED" | grep -nE 'eval\s*\(|new Function\s*\(' >/tmp/sca_hits.txt; then
            add_finding "dynamic JavaScript execution introduced" "\`eval\` and \`new Function\` are rarely acceptable in EstaCoda runtime code. Review for code injection or obfuscation risk.\n\n\`\`\`text\n$(cat /tmp/sca_hits.txt | head -20)\n\`\`\`"
          fi

          if echo "$JS_ADDED" | grep -nEi 'Buffer\.from\([^)]*(base64|hex)[^)]*\).*(eval|Function|exec|execSync|spawn|spawnSync)' >/tmp/sca_hits.txt; then
            add_finding "encoded payload plus execution" "Encoded strings flowing into dynamic execution or child processes are a strong supply-chain risk signal.\n\n\`\`\`text\n$(cat /tmp/sca_hits.txt | head -20)\n\`\`\`"
          fi

          if echo "$JS_ADDED" | grep -nE 'child_process\.(exec|execSync)\s*\(' >/tmp/sca_hits.txt; then
            add_advisory "child_process exec introduced" "Prefer argument-vector execution and explicit approvals. Confirm this path cannot bypass command policy.\n\n\`\`\`text\n$(cat /tmp/sca_hits.txt | head -20)\n\`\`\`"
          fi

          # 4. Download-and-execute shell patterns.
          SHELL_ADDED=$(git diff --unified=0 "$BASE"..."$HEAD" -- '*.sh' '.github/workflows/*.yml' '.github/workflows/*.yaml' \
            | grep '^+' | grep -v '^+++' || true)

          if echo "$SHELL_ADDED" | grep -nEi '(curl|wget)[^|;]*[|][[:space:]]*(bash|sh|zsh)|bash[[:space:]]*<\([[:space:]]*(curl|wget)' >/tmp/sca_hits.txt; then
            add_finding "download-and-execute shell pattern introduced" "Remote script execution must be justified and heavily reviewed. Prefer pinned downloads with checksum verification.\n\n\`\`\`text\n$(cat /tmp/sca_hits.txt | head -20)\n\`\`\`"
          fi

          # 5. Sensitive trust-boundary files changed. Advisory only; the code may be legitimate.
          SENSITIVE=$(echo "$CHANGED" | grep -E '^(src/(security|tools|runtime|skills|memory|channels|config)/|skills/|scripts/(install|setup-estacoda|uninstall|estacoda-wrapper)\.sh|Dockerfile|\.github/workflows/)' || true)
          if [ -n "$SENSITIVE" ]; then
            add_advisory "Security-sensitive surfaces changed" "Maintainers should review trust boundaries, approvals, secret handling, and rollback behavior.\n\n\`\`\`text\n$SENSITIVE\n\`\`\`"
          fi

          {
            echo "## Supply Chain Audit"
            echo
            if [ -s "$FINDINGS" ]; then
              echo "Blocking findings were detected."
              echo
              cat "$FINDINGS"
            else
              echo "No blocking supply-chain patterns detected."
              echo
            fi
            if [ -s "$ADVISORY" ]; then
              echo "## Advisory review notes"
              echo
              cat "$ADVISORY"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -s "$FINDINGS" ]; then
            cat "$FINDINGS"
            echo "::error::Critical supply-chain risk pattern detected. See job summary."
            exit 1
          fi

          echo "Supply-chain audit completed."
