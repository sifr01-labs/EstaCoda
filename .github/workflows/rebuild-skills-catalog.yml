name: Rebuild skills catalog

on:
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "registries/skills.sources.json"
      - "scripts/build-skills-catalog.ts"
      - "src/skills/catalog-builder.ts"
      - "src/contracts/skill.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/rebuild-skills-catalog.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild-skills-catalog-main
  cancel-in-progress: true

jobs:
  rebuild-skills-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22.18.0"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            website/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild skills catalog
        run: pnpm run skills:catalog

      - name: Install website dependencies
        run: pnpm --dir website install --frozen-lockfile --ignore-workspace

      - name: Verify website CLI dependencies
        run: test -x website/node_modules/.bin/docusaurus

      - name: Validate website build
        run: pnpm --dir website run build

      - name: Check generated changes
        id: diff
        run: |
          git status --short
          if [ -n "$(git status --short website/static/api/skills.json website/static/api/skills-meta.json)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated skills catalog
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/static/api/skills.json website/static/api/skills-meta.json
          git commit -m "chore(skills): rebuild generated catalog"
          git push
