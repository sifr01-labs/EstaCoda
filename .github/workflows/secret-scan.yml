name: Secret Scan

# Scan PR and main-branch changes for committed secrets. EstaCoda handles
# provider keys, gateway tokens, browser credentials, and local profile env
# files, so secret hygiene needs a dedicated check separate from general CI.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Scan pull request diff
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Scan pushed commits
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Scan current tree manually
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.event.before == '0000000000000000000000000000000000000000')
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51
        with:
          path: ./
          extra_args: --only-verified
